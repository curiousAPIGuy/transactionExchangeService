# Production Environment configuration
# Using PostgreSQL for production database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/transaction_exchange_db}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Security and persistence settings for production
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=validate
logging.level.com.wex=WARN

rest.client.connect-timeout=30000
rest.client.read-timeout=60000

