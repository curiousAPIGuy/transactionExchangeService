# Production Environment configuration
# In production, you would typically use a robust DB like MySQL/PostgreSQL
# Example: spring.datasource.url=jdbc:mysql://prod-db-server:3306/transaction_exchange_db
spring.datasource.url=jdbc:h2:file:./data/prod_transaction_exchange_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=prod_sa
spring.datasource.password=secure_password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Security and persistence settings for production
spring.h2.console.enabled=false
spring.jpa.hibernate.ddl-auto=validate
logging.level.com.wex=WARN

rest.client.connect-timeout=30000
rest.client.read-timeout=60000

